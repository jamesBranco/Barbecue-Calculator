<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <title>BBQ Calculator</title>
</head>

<body>
    <header>
        <h1>🍖 BBQ Calculator 🍺</h1>
    </header>

    <main class="container">
        <p>Plan your perfect BBQ with our easy calculator!</p>

        <form id="bbq-form">
            <input id="adults" type="number" placeholder="Number of Adults">
            <input id="children" type="number" placeholder="Number of Children">
            <input id="time" type="number" placeholder="Duration in Hours">

            <button type="button" onclick="calculate()">Calculate</button>
        </form>

        <div id="result"></div>
    </main>

    <footer>
        <p>Made with ❤️ for BBQ lovers.</p>
    </footer>

  
    <script src="script/script.js"></script>
</body>
</html>
